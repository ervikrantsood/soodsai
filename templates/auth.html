<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOOD AI - Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --secondary: #00d288;
            --border: rgba(255, 255, 255, 0.08);
            --surface: rgba(255, 255, 255, 0.03);
            
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Abstract Background */
        .aura {
            position: fixed;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }
        .aura-1 { top: -20%; left: -20%; background: var(--primary); }
        .aura-2 { bottom: -20%; right: -20%; background: var(--secondary); }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--surface);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            height: 55px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0 20px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-primary {
            width: 100%;
            height: 55px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
        }

        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            color: #333;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span { padding: 0 15px; }

        .btn-google {
            width: 100%;
            height: 55px;
            background: white;
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }

        .btn-google:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .toggle-auth {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #666;
        }

        .toggle-auth a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        #error-msg {
            color: #ff3131;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>

    <div class="auth-container">
        <h1 class="brand-logo">SOOD AI</h1>
        <p class="subtitle" id="auth-subtitle">Terminal Authorization</p>

        <div id="error-msg">Invalid credentials. Access denied.</div>

        <form id="auth-form" action="/login" method="POST">
            <div class="input-group" id="name-group" style="display: none;">
                <label>Full Name</label>
                <input type="text" name="name" class="input-field" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" class="input-field" placeholder="name@company.com" required>
            </div>
            <div class="input-group">
                <label>Access Key</label>
                <input type="password" name="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">
                <span>INITIALIZE SESSION</span>
                <i class="fa-solid fa-arrow-right-long"></i>
            </button>
        </form>

        <div class="divider"><span>OR CONTINUE WITH</span></div>

        <button class="btn-google" onclick="window.location.href='/login/google'">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
            Sign in with Google
        </button>

        <div class="toggle-auth">
            <span id="toggle-text">New to the terminal?</span>
            <a href="javascript:void(0)" id="toggle-link" onclick="toggleMode()">Create Account</a>
        </div>
    </div>

    <script>
        let isLogin = true;
        
        function toggleMode() {
            isLogin = !isLogin;
            const subtitle = document.getElementById('auth-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleLink = document.getElementById('toggle-link');
            const form = document.getElementById('auth-form');
            const nameGroup = document.getElementById('name-group');

            if (isLogin) {
                subtitle.innerText = "Terminal Authorization";
                submitBtn.querySelector('span').innerText = "INITIALIZE SESSION";
                toggleText.innerText = "New to the terminal?";
                toggleLink.innerText = "Create Account";
                form.action = "/login";
                nameGroup.style.display = "none";
            } else {
                subtitle.innerText = "Registry New Operator";
                submitBtn.querySelector('span').innerText = "CREATE IDENTITY";
                toggleText.innerText = "Already registered?";
                toggleLink.innerText = "Execute Login";
                form.action = "/signup";
                nameGroup.style.display = "block";
            }
        }

        // Handle URL params for errors
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').innerText = urlParams.get('error');
        }
    </script>
</body>
</html>
